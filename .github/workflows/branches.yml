name: code

on:
  push:
    branches:
      - '**'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1
      - name: Install go dependencies
        run: make install-go-dependencies
      - name: Run tests
        run: make test-backend
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: test frontend
        run: make test-frontend
  build-plugin-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1
      - name: Install go dependencies
        run: make install-go-dependencies
      - name: build all versions
        run: make build-backend-all
      - name: Upload linux binaries
        uses: actions/upload-artifact@v6
        with:
          name: plugin-executables
          path: ./dist/
  test-e2e:
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
      - build-plugin-backend
    steps:
      - uses: actions/checkout@v5
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Download plugin backend
        uses: actions/download-artifact@v7
        with:
          name: plugin-executables
          path: ./dist/
      - name: Build frontend
        run: make build-frontend
      - name: fix file permissions
        run: chmod +x ./dist/gpx_*
      - name: Run E2E Tests
        run: make test-e2e-no-build
      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Debug Logs
        if: ${{ failure() }}
        run: docker compose logs grafana
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: >
          npm install --global
          @semantic-release/git
          @semantic-release/npm
          @semantic-release/exec
          conventional-changelog-conventionalcommits
          semantic-release
      - name: check
        env:
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN }}
        run: npx semantic-release --dry-run --branches ${GITHUB_REF_NAME}
  version_and_tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - verify-release
      - test-e2e
      - test-backend
      - test-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: >
          npm install --global
          @semantic-release/git
          @semantic-release/npm
          @semantic-release/exec
          conventional-changelog-conventionalcommits
          semantic-release
      - name: commit-and-tag
        env:
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN }}
        run: npx semantic-release
